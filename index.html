<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VagasBot Moçambique</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; }
        body {
            background: #0b1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }
        .app {
            max-width: 480px;
            width: 100%;
            background: #f0f4fa;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .header {
            background: linear-gradient(145deg, #0d2844, #1a3a5c);
            padding: 20px 20px 14px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #2e5a7a;
        }
        .header h1 { font-size: 22px; font-weight: 700; }
        .header h1 span { color: #6fc3ff; }
        .badge { background: #1f8b4c; padding: 4px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; color: #fff; }
        .badge.dono { background: #f5b042; color: #1f2a38; }
        .chat {
            padding: 16px 14px 8px;
            height: 460px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #e9eef3;
            scroll-behavior: smooth;
        }
        .message-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            max-width: 95%;
            animation: fadeIn 0.25s ease;
        }
        .message-wrapper.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message-wrapper.bot {
            align-self: flex-start;
        }
        .avatar-bot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a5f9e, #6fc3ff);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .message {
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            flex: 1;
        }
        .message.bot {
            background: #ffffff;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            color: #1a2634;
        }
        .message.user {
            background: #1f5e9e;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message .small { font-size: 12px; opacity: 0.7; margin-top: 6px; display: block; }
        .message .dono-tag {
            background: #f5b042;
            color: #1f2a38;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 30px;
            display: inline-block;
            margin-left: 6px;
        }

        .action-buttons {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .btn-action {
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 30px;
            transition: 0.2s;
            color: #4a5b6e;
            line-height: 1;
        }
        .btn-action:hover {
            background: #d0d9e3;
            transform: scale(1.1);
        }
        .btn-action.playing {
            color: #1f5e9e;
            animation: pulse-audio 0.8s infinite;
        }
        .btn-action.pausado {
            color: #f5b042;
            animation: none;
        }
        .btn-action.copiado {
            color: #1f8b4c;
        }
        .btn-action.idioma {
            font-size: 13px;
            font-weight: 600;
            background: #eef3f9;
            border: 1px solid #bcc9d9;
            padding: 2px 12px;
            border-radius: 30px;
        }
        .btn-action.idioma:hover { background: #d0def0; }
        @keyframes pulse-audio {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.25); }
        }

        .btn-controle-audio {
            background: transparent;
            border: 1px solid #bcc9d9;
            border-radius: 30px;
            padding: 2px 12px;
            font-size: 14px;
            cursor: pointer;
            background: #eef3f9;
            transition: 0.2s;
            color: #1a2634;
            font-weight: 600;
        }
        .btn-controle-audio:hover { background: #d0def0; }
        .btn-controle-audio:active { transform: scale(0.95); }

        .btn-stop-global {
            background: #e74c3c;
            border: none;
            border-radius: 30px;
            padding: 4px 14px;
            color: white;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-stop-global:active { opacity: 0.7; }

        .typing {
            align-self: flex-start;
            background: #e4eaf1;
            padding: 12px 18px;
            border-radius: 24px;
            font-size: 14px;
            color: #4a5b6e;
            display: flex;
            gap: 6px;
        }
        .typing span { animation: pulse 1.4s infinite; display: inline-block; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.9); }
            40% { opacity: 1; transform: scale(1.1); }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .input-area {
            display: flex;
            gap: 8px;
            padding: 10px 14px 16px;
            background: #f0f4fa;
            border-top: 1px solid #d0d9e3;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            border: none;
            border-radius: 30px;
            padding: 12px 18px;
            font-size: 15px;
            background: white;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.03);
            outline: none;
        }
        .input-area .btn-microfone {
            background: transparent;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: 0.2s;
            color: #1a5f9e;
            line-height: 1;
        }
        .input-area .btn-microfone:active { transform: scale(0.9); }
        .input-area .btn-microfone.gravando {
            color: #e74c3c;
            animation: pulse-microfone 1.2s infinite;
        }
        @keyframes pulse-microfone {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .input-area button.btn-enviar {
            background: #1a5f9e;
            border: none;
            border-radius: 30px;
            padding: 0 20px;
            color: white;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(26, 95, 158, 0.3);
        }
        .input-area button.btn-enviar:active { transform: scale(0.94); background: #0f3f6b; }
        .input-area button.btn-enviar:disabled { opacity: 0.5; pointer-events: none; }

        .footer {
            background: #dce3ec;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #2d4057;
            border-top: 1px solid #c2cddb;
            flex-wrap: wrap;
            gap: 6px;
        }
        .footer span { font-weight: 600; color: #0f3f6b; }
        .footer-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .btn-assinar {
            background: #f5b042;
            border: none;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 13px;
            color: #1f2a38;
            cursor: pointer;
        }
        .btn-assinar:active { opacity: 0.7; }

        .plano-box {
            display: flex;
            gap: 10px;
            margin: 6px 0 4px;
            flex-wrap: wrap;
        }
        .plano-btn {
            background: #eef3f9;
            border: 1px solid #bcc9d9;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 600;
            color: #1a2c42;
            cursor: pointer;
            transition: 0.15s;
        }
        .plano-btn:active { background: #d0def0; transform: scale(0.96); }
        .plano-btn.destaque { background: #1f8b4c; color: white; border-color: #1f8b4c; }
        .message.bot .plano-btn { background: #eef3f9; border-color: #b0c2d6; }
        .message.bot .plano-btn.destaque { background: #1f8b4c; border-color: #1f8b4c; color: white; }

        .chat::-webkit-scrollbar { width: 4px; }
        .chat::-webkit-scrollbar-thumb { background: #a0b7ce; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>Vagas<span>Bot</span></h1>
            <div class="badge" id="badgeStatus">🇲🇿 Moçambique</div>
        </div>
        <div class="chat" id="chatContainer">
            <!-- Mensagens serão inseridas aqui -->
        </div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Escreve ou fala a tua mensagem..." autocomplete="off">
            <button class="btn-microfone" id="microfoneBtn" aria-label="Falar em vez de escrever">🎤</button>
            <button class="btn-enviar" id="sendBtn">Enviar</button>
        </div>
        <div class="footer">
            <span id="footerStatus">🙌 +120 pessoas já encontraram</span>
            <div class="footer-actions">
                <button class="btn-action idioma" id="idiomaBtn">🇧🇷 PT</button>
                <button class="btn-controle-audio" id="pausarBtn">⏸ Pausar</button>
                <button class="btn-stop-global" id="stopAudioBtn">⏹ Parar</button>
                <button class="btn-assinar" id="assinarBtn">✨ Assinar Premium</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURAÇÕES DO UTILIZADOR
        // ============================================================
        const DONO_TELEFONE = '879306034';
        let usuarioTelefone = '879306034';
        // ============================================================

        const API_BASE = 'https://vagasbot-web-api.onrender.com';
        const chat = document.getElementById('chatContainer');
        const input = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const assinarBtn = document.getElementById('assinarBtn');
        const badgeStatus = document.getElementById('badgeStatus');
        const footerStatus = document.getElementById('footerStatus');
        const stopAudioBtn = document.getElementById('stopAudioBtn');
        const idiomaBtn = document.getElementById('idiomaBtn');
        const microfoneBtn = document.getElementById('microfoneBtn');
        const pausarBtn = document.getElementById('pausarBtn');

        let aguardandoPlano = false;
        let audioIdioma = 'pt-BR';

        // ============================================================
        // CONTROLE DE ÁUDIO (PAUSAR/RETOMAR)
        // ============================================================
        let textoPausado = null;
        let elementoAudioPausado = null;
        let idiomaPausado = 'pt-BR';
        let audioPausado = false;

        // ============================================================
        // SPEECH-TO-TEXT (MICROFONE)
        // ============================================================
        let recognition = null;
        let estaGravando = false;

        function iniciarReconhecimento() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('Seu navegador não suporta reconhecimento de voz. Use Chrome ou Edge.');
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = function() {
                estaGravando = true;
                microfoneBtn.classList.add('gravando');
                microfoneBtn.textContent = '⏺️';
                input.placeholder = '🎤 Ouvindo...';
            };

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                input.value = transcript;
                setTimeout(() => {
                    if (input.value.trim()) {
                        enviarMensagem();
                    }
                }, 600);
            };

            recognition.onerror = function(event) {
                console.error('Erro no reconhecimento:', event.error);
                if (event.error === 'not-allowed') {
                    alert('Permissão de microfone negada. Ative-a nas configurações do navegador.');
                }
                pararReconhecimento();
            };

            recognition.onend = function() {
                pararReconhecimento();
            };

            recognition.start();
        }

        function pararReconhecimento() {
            if (recognition) {
                try { recognition.stop(); } catch (e) {}
            }
            estaGravando = false;
            microfoneBtn.classList.remove('gravando');
            microfoneBtn.textContent = '🎤';
            input.placeholder = 'Escreve ou fala a tua mensagem...';
        }

        microfoneBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (estaGravando) {
                pararReconhecimento();
            } else {
                iniciarReconhecimento();
            }
        });

        input.addEventListener('focus', function() {
            if (estaGravando) pararReconhecimento();
        });

        // ============================================================
        // TEXT-TO-SPEECH (FALAR)
        // ============================================================
        function falar(texto, elementoAudio, idioma = 'pt-BR') {
            // Se já está a falar, cancela
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }

            if (!('speechSynthesis' in window)) {
                alert('Seu navegador não suporta leitura em voz alta.');
                return;
            }

            const textoLimpo = texto.replace(/<[^>]*>/g, '').replace(/[^\w\s,.!?çãõáéíóúâêîôûàèìòùäëïöü]/g, ' ').trim();
            if (!textoLimpo) return;

            // Guarda o texto e elemento para possível pausa
            textoPausado = textoLimpo;
            elementoAudioPausado = elementoAudio;
            idiomaPausado = idioma;

            const utterance = new SpeechSynthesisUtterance(textoLimpo);
            utterance.lang = idioma;
            utterance.rate = 0.9;
            utterance.pitch = 1.0;
            utterance.volume = 1;

            const voices = window.speechSynthesis.getVoices();
            const vozFeminina = voices.find(v =>
                v.lang.startsWith(idioma) &&
                (v.name.toLowerCase().includes('female') ||
                 v.name.toLowerCase().includes('feminina') ||
                 v.name.toLowerCase().includes('google') ||
                 v.name.toLowerCase().includes('samantha') ||
                 v.name.toLowerCase().includes('maria'))
            );
            if (vozFeminina) utterance.voice = vozFeminina;

            // Feedback visual
            if (elementoAudio) {
                elementoAudio.classList.add('playing');
                elementoAudio.textContent = '🔊';
            }
            // Mostra botões de controle
            stopAudioBtn.style.display = 'inline-block';
            pausarBtn.textContent = '⏸ Pausar';
            pausarBtn.style.display = 'inline-block';
            audioPausado = false;

            utterance.onend = function() {
                if (elementoAudio) {
                    elementoAudio.classList.remove('playing');
                    elementoAudio.textContent = '🔊';
                }
                stopAudioBtn.style.display = 'none';
                pausarBtn.style.display = 'none';
                textoPausado = null;
                elementoAudioPausado = null;
                audioPausado = false;
            };

            utterance.onerror = function(e) {
                console.error('Erro na síntese de voz:', e);
                if (elementoAudio) {
                    elementoAudio.classList.remove('playing');
                    elementoAudio.textContent = '🔊';
                }
                stopAudioBtn.style.display = 'none';
                pausarBtn.style.display = 'none';
                textoPausado = null;
                elementoAudioPausado = null;
                audioPausado = false;
                alert('Não foi possível reproduzir o áudio. Tente novamente.');
            };

            window.speechSynthesis.speak(utterance);
        }

        // ============================================================
        // PAUSAR / RETOMAR LEITURA
        // ============================================================
        function pausarOuRetomar() {
            if (window.speechSynthesis.speaking) {
                // Está a tocar -> Pausar
                window.speechSynthesis.cancel();
                audioPausado = true;
                pausarBtn.textContent = '▶️ Retomar';
                if (elementoAudioPausado) {
                    elementoAudioPausado.classList.remove('playing');
                    elementoAudioPausado.classList.add('pausado');
                    elementoAudioPausado.textContent = '⏸';
                }
            } else if (audioPausado && textoPausado) {
                // Está pausado -> Retomar
                audioPausado = false;
                pausarBtn.textContent = '⏸ Pausar';
                // Retoma a leitura com o mesmo texto e elemento
                const el = elementoAudioPausado;
                if (el) {
                    el.classList.remove('pausado');
                    el.classList.add('playing');
                    el.textContent = '🔊';
                }
                falar(textoPausado, el, idiomaPausado);
                // Nota: o falar vai cancelar qualquer coisa, mas já cancelámos
            }
        }

        pausarBtn.addEventListener('click', pausarOuRetomar);

        // ============================================================
        // PARAR LEITURA (CANCELAR TOTALMENTE)
        // ============================================================
        function pararLeitura() {
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }
            document.querySelectorAll('.btn-action.playing, .btn-action.pausado').forEach(btn => {
                btn.classList.remove('playing', 'pausado');
                btn.textContent = '🔊';
            });
            stopAudioBtn.style.display = 'none';
            pausarBtn.style.display = 'none';
            textoPausado = null;
            elementoAudioPausado = null;
            audioPausado = false;
        }

        stopAudioBtn.addEventListener('click', pararLeitura);

        // ============================================================
        // ALTERNAR IDIOMA
        // ============================================================
        function alternarIdioma() {
            audioIdioma = audioIdioma === 'pt-BR' ? 'en-US' : 'pt-BR';
            idiomaBtn.textContent = audioIdioma === 'pt-BR' ? '🇧🇷 PT' : '🇺🇸 EN';
        }
        idiomaBtn.addEventListener('click', alternarIdioma);

        // ============================================================
        // COPIAR TEXTO
        // ============================================================
        async function copiarTexto(texto, elementoBotao) {
            try {
                await navigator.clipboard.writeText(texto);
                elementoBotao.textContent = '✅';
                elementoBotao.classList.add('copiado');
                setTimeout(() => {
                    elementoBotao.textContent = '📋';
                    elementoBotao.classList.remove('copiado');
                }, 2000);
            } catch (err) {
                console.error('Erro ao copiar:', err);
                alert('Não foi possível copiar. Tente selecionar o texto manualmente.');
            }
        }

        // ============================================================
        // UI / INTERFACE
        // ============================================================
        function isDono() {
            return usuarioTelefone === DONO_TELEFONE;
        }

        function atualizarInterface() {
            if (isDono()) {
                badgeStatus.textContent = '👑 Dono';
                badgeStatus.className = 'badge dono';
                footerStatus.innerHTML = '👑 Dono Supremo – Acesso total';
            } else {
                badgeStatus.textContent = '🇲🇿 Moçambique';
                badgeStatus.className = 'badge';
                footerStatus.innerHTML = '🙌 +120 pessoas já encontraram';
            }
        }

        // ============================================================
        // ADICIONAR MENSAGEM (COM ÁUDIO E COPIAR)
        // ============================================================
        function addMessage(text, tipo = 'bot', extra = '') {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${tipo}`;

            if (tipo === 'bot') {
                const avatar = document.createElement('div');
                avatar.className = 'avatar-bot';
                avatar.textContent = 'V';
                wrapper.appendChild(avatar);
            }

            const bubble = document.createElement('div');
            bubble.className = `message ${tipo}`;
            bubble.innerHTML = text + extra;
            wrapper.appendChild(bubble);

            if (tipo === 'bot') {
                const actionDiv = document.createElement('div');
                actionDiv.className = 'action-buttons';

                // Botão Ouvir
                const audioBtn = document.createElement('button');
                audioBtn.className = 'btn-action';
                audioBtn.textContent = '🔊';
                audioBtn.setAttribute('aria-label', 'Ouvir mensagem');
                audioBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const textoMsg = bubble.innerText || bubble.textContent;
                    const textoLimpo = textoMsg.replace(/Semanal|Mensal|50 MT|150 MT/g, '').trim();
                    if (textoLimpo) {
                        falar(textoLimpo, audioBtn, audioIdioma);
                    } else {
                        falar('Escolha uma opção de plano.', audioBtn, audioIdioma);
                    }
                });
                actionDiv.appendChild(audioBtn);

                // Botão Copiar
                const copyBtn = document.createElement('button');
                copyBtn.className = 'btn-action';
                copyBtn.textContent = '📋';
                copyBtn.setAttribute('aria-label', 'Copiar mensagem');
                copyBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const textoMsg = bubble.innerText || bubble.textContent;
                    copiarTexto(textoMsg, copyBtn);
                });
                actionDiv.appendChild(copyBtn);

                wrapper.appendChild(actionDiv);
            }

            chat.appendChild(wrapper);
            chat.scrollTop = chat.scrollHeight;
        }

        // ============================================================
        // INDICADOR DE DIGITAÇÃO
        // ============================================================
        function mostrarDigitando() {
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typingIndicator';
            div.innerHTML = '<span>●</span><span>●</span><span>●</span>';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
        function removerDigitando() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        // ============================================================
        // CHAMADAS À API
        // ============================================================
        async function chamarAPI(endpoint, dados) {
            try {
                const payload = { ...dados, idioma: navigator.language.split('-')[0] || 'pt' };
                const resp = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                return await resp.json();
            } catch (err) {
                console.error('Erro na API:', err);
                return null;
            }
        }

        // ============================================================
        // PROCESSAR MENSAGEM
        // ============================================================
        async function processarMensagem(texto) {
            const lower = texto.trim().toLowerCase();

            if (aguardandoPlano) {
                if (lower.includes('semanal') || lower.includes('50')) {
                    aguardandoPlano = false;
                    await criarPagamento('semanal');
                    return;
                } else if (lower.includes('mensal') || lower.includes('150')) {
                    aguardandoPlano = false;
                    await criarPagamento('mensal');
                    return;
                } else {
                    addMessage('Escolhe uma opção: <strong>semanal</strong> (50 MT) ou <strong>mensal</strong> (150 MT).', 'bot');
                    return;
                }
            }

            if (lower.startsWith('!')) {
                if (!isDono()) {
                    addMessage('⛔ Comando secreto apenas para o Dono Supremo.', 'bot');
                    return;
                }
                const partes = lower.split(' ');
                const cmd = partes[0];

                if (cmd === '!ajuda' || cmd === '!help') {
                    addMessage(`👑 *Comandos de Dono:*\n• \`!assinantes\` – lista todos os assinantes\n• \`!add vaga\` – adiciona uma vaga (formato: título|cidade|salário|área|benefício)\n• \`!remover vaga TÍTULO\` – remove pelo título exato\n• \`!vagas\` – ver todas as vagas (já é padrão para si)`, 'bot');
                    return;
                }

                if (cmd === '!assinantes') {
                    await listarAssinantes();
                    return;
                }

                if (cmd === '!add') {
                    const resto = texto.substring(4).trim();
                    if (!resto.includes('|')) {
                        addMessage('⚠️ Formato inválido. Use: `!add título|cidade|salário|área|benefício`', 'bot');
                        return;
                    }
                    const [titulo, cidade, salario, area, beneficio] = resto.split('|').map(s => s.trim());
                    if (!titulo || !cidade || !salario || !area || !beneficio) {
                        addMessage('⚠️ Todos os campos são obrigatórios.', 'bot');
                        return;
                    }
                    await adicionarVaga({ titulo, cidade, salario, area, beneficio });
                    return;
                }

                if (cmd === '!remover') {
                    const titulo = texto.substring(9).trim();
                    if (!titulo) {
                        addMessage('⚠️ Diga o título da vaga a remover. Ex: `!remover Desenvolvedor Java Pleno`', 'bot');
                        return;
                    }
                    await removerVaga(titulo);
                    return;
                }

                addMessage('Comando não reconhecido. Use `!ajuda` para ver a lista.', 'bot');
                return;
            }

            if (lower.startsWith('vagas')) {
                const partes = lower.split(' ');
                let cidade = null, area = null;
                if (partes.length > 1) {
                    const filtro = partes.slice(1).join(' ');
                    const cidades = ['maputo', 'beira', 'nampula', 'pemba', 'tete', 'quelimane'];
                    if (cidades.some(c => filtro.includes(c))) {
                        cidade = filtro;
                    } else {
                        area = filtro;
                    }
                }
                await buscarVagas(cidade, area);
                return;
            }

            if (lower.includes('ajuda') || lower === '?') {
                let msg = `📋 *Comandos:*\n• "vagas" – ver todas as oportunidades\n• "vagas Maputo" – filtrar por cidade\n• "vagas TI" – filtrar por área\n• "assinar" – plano Premium\n• "verificar" – estado da conta\n• "ajuda" – esta mensagem`;
                if (isDono()) msg += `\n\n👑 *Comandos de Dono:* use "!ajuda" para lista secreta.`;
                addMessage(msg, 'bot');
                return;
            }

            if (lower.includes('verificar') || lower.includes('status')) {
                await verificarAcesso();
                return;
            }

            if (lower.includes('assinar') || lower.includes('premium')) {
                aguardandoPlano = true;
                addMessage('📦 Escolhe o plano:', 'bot', `
                    <div class="plano-box">
                        <button class="plano-btn" onclick="escolherPlano('semanal')">🗓️ Semanal – 50 MT</button>
                        <button class="plano-btn destaque" onclick="escolherPlano('mensal')">📆 Mensal – 150 MT</button>
                    </div>
                `);
                return;
            }

            await buscarVagas();
        }

        // ============================================================
        // FUNÇÕES DA API
        // ============================================================
        async function buscarVagas(cidade = null, area = null) {
            mostrarDigitando();
            const payload = { telefone: usuarioTelefone };
            if (cidade) payload.cidade = cidade;
            if (area) payload.area = area;

            const dados = await chamarAPI('/vagas', payload);
            removerDigitando();

            if (!dados) {
                addMessage('⚠️ Não consegui buscar vagas agora. Tenta novamente em instantes!', 'bot');
                return;
            }

            if (dados.total === 0) {
                addMessage('😕 Nenhuma vaga encontrada para esse filtro. Tenta outro.', 'bot');
                return;
            }

            let prefixo = '';
            if (cidade) prefixo = ` em ${cidade}`;
            if (area) prefixo += ` (${area})`;
            if (!cidade && !area) prefixo = ' (todas)';

            const donoTag = isDono() ? ' 👑' : '';
            addMessage(`📌 *Vagas${prefixo}* – ${dados.total} encontradas${donoTag}`, 'bot');

            dados.vagas.forEach(v => addMessage(`• ${v}`, 'bot'));

            if (dados.plano === 'gratuito') {
                addMessage('🔒 *Assine Premium* para ver benefícios e detalhes completos! Envie "assinar".', 'bot');
            } else if (dados.plano === 'dono') {
                addMessage('👑 Dono Supremo – todas as vagas com detalhes estão disponíveis!', 'bot');
            } else {
                addMessage('🔓 Detalhes completos disponíveis!', 'bot');
            }
        }

        async function verificarAcesso() {
            mostrarDigitando();
            const dados = await chamarAPI('/verificar-acesso', { telefone: usuarioTelefone });
            removerDigitando();
            if (!dados) {
                addMessage('⚠️ Não foi possível verificar o seu acesso.', 'bot');
                return;
            }
            if (dados.dono) {
                addMessage('👑 Você é o *Dono Supremo*! Acesso total a todas as funcionalidades.', 'bot');
            } else if (dados.assinante) {
                addMessage('✅ *Parabéns!* Tens acesso Premium ativo. 🎉', 'bot');
            } else {
                addMessage('🔒 Ainda não tens acesso Premium. Envia "assinar" para aderir.', 'bot');
            }
        }

        async function criarPagamento(plano) {
            mostrarDigitando();
            const dados = await chamarAPI('/criar-pagamento', {
                telefone: usuarioTelefone,
                plano: plano
            });
            removerDigitando();
            if (!dados) {
                addMessage('⚠️ Erro ao iniciar pagamento. Tenta novamente.', 'bot');
                return;
            }
            if (dados.success && dados.payment_url) {
                addMessage(`🔗 Redirecionando para pagamento (${plano})...`, 'bot');
                window.location.href = dados.payment_url;
            } else {
                addMessage('❌ Falha ao criar pagamento. Detalhes: ' + (dados.erro || 'erro desconhecido'), 'bot');
            }
        }

        // --- Admin ---
        async function listarAssinantes() {
            mostrarDigitando();
            const dados = await chamarAPI('/admin/assinantes', { telefone: usuarioTelefone });
            removerDigitando();
            if (!dados || dados.erro) {
                addMessage('⚠️ ' + (dados?.erro || 'Erro ao listar assinantes.'), 'bot');
                return;
            }
            if (dados.total === 0) {
                addMessage('📭 Nenhum assinante ainda.', 'bot');
            } else {
                addMessage(`📋 *Assinantes (${dados.total})*:\n${dados.assinantes.join('\n')}`, 'bot');
            }
        }

        async function adicionarVaga(vaga) {
            mostrarDigitando();
            const dados = await chamarAPI('/admin/add-vaga', {
                telefone: usuarioTelefone,
                vaga: vaga
            });
            removerDigitando();
            if (!dados || dados.erro) {
                addMessage('⚠️ ' + (dados?.erro || 'Erro ao adicionar vaga.'), 'bot');
                return;
            }
            addMessage(`✅ Vaga "${vaga.titulo}" adicionada com sucesso! Total: ${dados.total} vagas.`, 'bot');
        }

        async function removerVaga(titulo) {
            mostrarDigitando();
            const dados = await chamarAPI('/admin/remover-vaga', {
                telefone: usuarioTelefone,
                titulo: titulo
            });
            removerDigitando();
            if (!dados || dados.erro) {
                addMessage('⚠️ ' + (dados?.erro || 'Erro ao remover vaga.'), 'bot');
                return;
            }
            addMessage(`✅ Vaga "${titulo}" removida com sucesso! Total restante: ${dados.total}.`, 'bot');
        }

        // ============================================================
        // FUNÇÕES GLOBAIS (para botões inline)
        // ============================================================
        window.escolherPlano = function(plano) {
            aguardandoPlano = false;
            criarPagamento(plano);
        };

        // ============================================================
        // EVENTOS DO CHAT
        // ============================================================
        sendBtn.addEventListener('click', enviarMensagem);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') enviarMensagem();
        });

        function enviarMensagem() {
            const texto = input.value.trim();
            if (!texto) return;
            addMessage(texto, 'user');
            input.value = '';
            input.disabled = true;
            sendBtn.disabled = true;
            processarMensagem(texto).finally(() => {
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            });
        }

        assinarBtn.addEventListener('click', () => {
            addMessage('assinar', 'user');
            processarMensagem('assinar');
        });

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        atualizarInterface();

        if (window.speechSynthesis) {
            window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
            };
        }

        // Oculta os botões de áudio inicialmente
        stopAudioBtn.style.display = 'none';
        pausarBtn.style.display = 'none';

        window.addEventListener('load', () => {
            setTimeout(() => {
                let extra = '';
                if (isDono()) extra = ' 👑 Tens acesso total a todas as vagas.';
                addMessage(`💬 Podes enviar "vagas", "vagas Maputo", "vagas TI", "assinar" ou "ajuda".${extra}`, 'bot');
                if (isDono()) {
                    addMessage('🔐 *Comandos secretos:* digita "!ajuda" para ver a lista de comandos de dono.', 'bot');
                }
            }, 600);
        });
    </script>
</body>
</html>
