<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VagasBot Neon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; }
    body { background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px; }

    header {
      width: 100%; max-width: 600px; text-align: center; padding: 20px 16px 12px;
      font-size: 24px; font-weight: 800; letter-spacing: 1px;
      background: linear-gradient(90deg, #0ff, #a855f7, #0ff); background-size: 300%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: gradiente 4s ease infinite;
    }
    @keyframes gradiente { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    header small { display: block; font-size: 12px; font-weight: 400; -webkit-text-fill-color: #aaa; }

    nav {
      width: 100%; max-width: 600px; display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 4px;
      background: #141414; padding: 6px; border-radius: 14px; margin: 10px 0 16px;
      border: 1px solid #2a2a2a; -webkit-overflow-scrolling: touch;
    }
    nav button {
      flex: 0 0 auto; padding: 8px 14px; border: none; background: transparent;
      color: #aaa; font-weight: 600; font-size: 12px; border-radius: 10px; cursor: pointer;
      transition: 0.2s; white-space: nowrap;
    }
    nav button:hover { background: #1f1f1f; color: #0ff; }
    nav button.active { background: #0ff; color: #000; font-weight: 700; box-shadow: 0 0 20px rgba(0,255,255,0.3); }

    .app-container {
      width: 100%; max-width: 600px; background: #101010; border-radius: 18px; padding: 16px;
      border: 1px solid #222; box-shadow: 0 0 40px rgba(0,255,255,0.03); min-height: 70vh;
    }
    .tab { display: none; animation: fade 0.3s ease; }
    .tab.active { display: block; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .chat-box {
      background: #141414; border-radius: 14px; padding: 12px; margin: 8px 0;
      border: 1px solid #222; height: 50vh; overflow-y: auto; scroll-behavior: smooth;
    }
    .chat-box p { margin: 6px 0; color: #ccc; line-height: 1.5; border-bottom: 1px solid #1a1a1a; padding: 6px 0; }
    .chat-box .user { color: #0ff; }
    .chat-box .bot { color: #ddd; }

    input, textarea {
      width: 100%; padding: 10px 14px; margin: 6px 0 10px; background: #1a1a1a;
      border: 1px solid #2a2a2a; border-radius: 10px; color: #fff; font-size: 15px; transition: 0.3s;
    }
    input:focus, textarea:focus { outline: none; border-color: #0ff; box-shadow: 0 0 15px rgba(0,255,255,0.1); }

    button {
      padding: 8px 18px; border: none; border-radius: 10px; background: #0ff; color: #000;
      font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s;
    }
    button:hover { transform: scale(1.02); box-shadow: 0 0 25px rgba(0,255,255,0.2); }
    button:active { transform: scale(0.97); }
    button.secondary { background: #2a2a2a; color: #aaa; }
    button.secondary:hover { background: #3a3a3a; color: #fff; }

    .valor-btn { background: #1a1a1a; color: #aaa; border: 1px solid #2a2a2a; }
    .valor-btn.ativo { background: #0ff; color: #000; border-color: #0ff; }
    .valor-btn.destaque { background: #f5b042; color: #000; border-color: #f5b042; }

    .footer-actions {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 10px; justify-content: center;
    }
    .selector-group {
      display: flex; gap: 4px; background: #1a1a1a; border-radius: 30px; padding: 4px; border: 1px solid #2a2a2a;
    }
    .selector-option {
      background: transparent; border: none; padding: 4px 12px; border-radius: 30px;
      font-size: 12px; font-weight: 600; cursor: pointer; color: #aaa; transition: 0.2s;
    }
    .selector-option.active { background: #0ff; color: #000; }

    .btn-audio { background: transparent; border: none; font-size: 16px; cursor: pointer; color: #aaa; padding: 2px 6px; }
    .btn-audio.playing { color: #0ff; animation: pulse 0.8s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

    #whatsappBtn {
      position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px;
      background: #25D366; color: #fff; border: none; border-radius: 50%; font-size: 28px;
      box-shadow: 0 4px 20px rgba(37,211,102,0.4); z-index: 999;
      display: flex; align-items: center; justify-content: center; text-decoration: none;
    }
    #whatsappBtn:hover { transform: scale(1.08); }

    @media (max-width: 480px) {
      header { font-size: 20px; padding: 14px; }
      nav button { font-size: 11px; padding: 6px 10px; }
      .app-container { padding: 12px; }
      .chat-box { height: 40vh; }
      #whatsappBtn { width: 48px; height: 48px; font-size: 24px; bottom: 16px; right: 16px; }
    }
  </style>
</head>
<body>

  <header>⚡ VagasBot Neon <small>Inteligência, vagas e muito mais</small></header>

  <nav id="navTabs">
    <button class="active" data-tab="chat">💬 Chat</button>
    <button data-tab="payment">💳 Pagamento</button>
    <button data-tab="info">ℹ️ Info</button>
  </nav>

  <div class="app-container">

    <!-- CHAT -->
    <div id="chat" class="tab active">
      <div id="chatBox" class="chat-box"></div>
      <div style="display:flex; gap:8px;">
        <input id="prompt" type="text" placeholder="Digite a sua mensagem..." style="flex:1;">
        <button onclick="sendMessage()">Enviar</button>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;">
        <button onclick="gerarPDF()" class="secondary">📄 PDF</button>
        <button onclick="uploadFoto()" class="secondary">🖼️ Foto</button>
      </div>
      <div class="footer-actions">
        <div class="selector-group" id="iaSelector">
          <button class="selector-option active" data-modelo="openrouter">🧠 OR</button>
          <button class="selector-option" data-modelo="groq">⚡ Groq</button>
        </div>
        <div class="selector-group" id="idiomaSelector">
          <button class="selector-option active" data-idioma="pt">🇧🇷 PT</button>
          <button class="selector-option" data-idioma="en">🇺🇸 EN</button>
        </div>
        <div class="selector-group" id="voiceSelector">
          <button class="selector-option active" data-voz="feminina">👩</button>
          <button class="selector-option" data-voz="masculina">👨</button>
          <button class="selector-option" data-voz="crianca">🧒</button>
        </div>
        <button class="secondary" id="stopAudioBtn" style="display:none;">⏹ Parar</button>
      </div>
    </div>

    <!-- PAGAMENTO -->
    <div id="payment" class="tab">
      <h3 style="color:#0ff;">💳 Escolha o valor</h3>
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin:10px 0;">
        <button onclick="escolherValor(20)" class="valor-btn">20 MT</button>
        <button onclick="escolherValor(30)" class="valor-btn">30 MT</button>
        <button onclick="escolherValor(50)" class="valor-btn">50 MT</button>
        <button onclick="escolherValor(150)" class="valor-btn destaque">150 MT</button>
      </div>
      <input id="phone" type="text" placeholder="Número Movitel (ex: 879306034)">
      <button onclick="startPayment()">💳 Confirmar Pagamento</button>
      <div id="paymentBox" class="chat-box" style="height:auto; min-height:80px;"></div>
    </div>

    <!-- INFO -->
    <div id="info" class="tab">
      <div style="display:flex; flex-direction:column; align-items:center; text-align:center;">
        <img id="ownerPhoto" src="sbj-bot.png" alt="Foto do Dono" style="width:100px; border-radius:50%; border:3px solid #0ff; box-shadow:0 0 30px rgba(0,255,255,0.3); margin-bottom:12px;">
        <h2 style="color:#fff; font-size:20px;">👑 Sebastião Benesson Janasse</h2>
        <p style="color:#aaa; max-width:400px; margin:8px auto; font-size:14px;">
          Dono Supremo do VagasBot. Esta ferramenta ajuda moçambicanos a encontrar emprego, gerir documentos e muito mais.
        </p>
        <p style="color:#0ff; font-size:13px; margin-top:10px;">📞 Dúvidas? Fale connosco no WhatsApp!</p>
      </div>
    </div>

  </div>

  <a id="whatsappBtn" href="https://wa.me/258879306034?text=Olá!%20Vim%20pelo%20VagasBot%20e%20gostaria%20de%20saber%20mais." target="_blank">💬</a>

  <script>
    // ============================================================
    // CONFIGURAÇÕES
    // ============================================================
    const API_URL = 'https://vagasbot-web-api.onrender.com';
    const USER = 'Sebastião';
    let modeloIA = 'openrouter';
    let idiomaAtual = 'pt';
    let vozSelecionada = 'feminina';
    let valorSelecionado = 150;

    // ============================================================
    // NAVEGAÇÃO
    // ============================================================
    const navButtons = document.querySelectorAll('#navTabs button');
    document.querySelectorAll('#navTabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        navButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });

    // ============================================================
    // SELETORES
    // ============================================================
    document.querySelectorAll('.selector-group').forEach(group => {
      group.addEventListener('click', (e) => {
        const btn = e.target.closest('.selector-option');
        if (!btn) return;
        group.querySelectorAll('.selector-option').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (group.id === 'iaSelector') {
          modeloIA = btn.dataset.modelo;
          addMessage(`🧠 IA: ${btn.textContent.trim()}`, 'bot');
        } else if (group.id === 'idiomaSelector') {
          idiomaAtual = btn.dataset.idioma;
          addMessage(idiomaAtual === 'pt' ? '🇧🇷 Português' : '🇺🇸 English', 'bot');
        } else if (group.id === 'voiceSelector') {
          vozSelecionada = btn.dataset.voz;
          if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
        }
      });
    });

    // ============================================================
    // CHAT
    // ============================================================
    function addMessage(text, type = 'bot') {
      const box = document.getElementById('chatBox');
      const p = document.createElement('p');
      p.className = type === 'user' ? 'user' : 'bot';
      p.innerHTML = `<strong>${type === 'user' ? '👤 Você' : '🤖 Vaga'}:</strong> ${text}`;
      box.appendChild(p);
      box.scrollTop = box.scrollHeight;
      
      if (type === 'bot' && text !== '⏳ A pensar...') {
        const audioBtn = document.createElement('button');
        audioBtn.className = 'btn-audio';
        audioBtn.textContent = '🔊';
        audioBtn.onclick = () => falar(text, audioBtn);
        p.appendChild(audioBtn);
      }
    }

    async function sendMessage() {
      const input = document.getElementById('prompt');
      const msg = input.value.trim();
      if (!msg) return;
      input.value = '';
      addMessage(msg, 'user');
      addMessage('⏳ A pensar...', 'bot');

      try {
        const resp = await fetch(`${API_URL}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            prompt: msg, 
            user: USER, 
            modelo: modeloIA, 
            idioma: idiomaAtual 
          })
        });
        const data = await resp.json();
        const box = document.getElementById('chatBox');
        const last = box.lastElementChild;
        if (last && last.textContent.includes('A pensar')) last.remove();
        addMessage(data.success ? data.reply : '⚠️ Erro ao processar.', 'bot');
      } catch (e) {
        const box = document.getElementById('chatBox');
        const last = box.lastElementChild;
        if (last && last.textContent.includes('A pensar')) last.remove();
        addMessage('⚠️ Falha ao contactar o servidor.', 'bot');
        console.error(e);
      }
    }

    document.getElementById('prompt').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // ============================================================
    // VOZ
    // ============================================================
    function falar(texto, elementoBotao) {
      if (!('speechSynthesis' in window)) {
        alert('Seu navegador não suporta leitura em voz alta. Use Chrome.');
        return;
      }
      if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();

      const textoLimpo = texto.replace(/<[^>]*>/g, '').trim();
      if (!textoLimpo) return;

      const utterance = new SpeechSynthesisUtterance(textoLimpo);
      utterance.lang = idiomaAtual === 'pt' ? 'pt-BR' : 'en-US';

      switch (vozSelecionada) {
        case 'feminina': utterance.pitch = 1.0; utterance.rate = 0.9; break;
        case 'masculina': utterance.pitch = 0.8; utterance.rate = 0.9; break;
        case 'crianca': utterance.pitch = 1.4; utterance.rate = 0.85; break;
      }

      let voices = window.speechSynthesis.getVoices();
      if (voices.length === 0) {
        window.speechSynthesis.onvoiceschanged = () => {
          voices = window.speechSynthesis.getVoices();
          const voz = voices.find(v => v.lang.startsWith(utterance.lang) && 
            (v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('feminina')));
          if (voz) utterance.voice = voz;
        };
      } else {
        const voz = voices.find(v => v.lang.startsWith(utterance.lang) && 
          (v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('feminina')));
        if (voz) utterance.voice = voz;
      }

      if (elementoBotao) {
        elementoBotao.classList.add('playing');
        elementoBotao.textContent = '🔊';
        document.getElementById('stopAudioBtn').style.display = 'inline-block';
      }

      utterance.onend = () => {
        if (elementoBotao) {
          elementoBotao.classList.remove('playing');
          elementoBotao.textContent = '🔊';
        }
        document.getElementById('stopAudioBtn').style.display = 'none';
      };

      utterance.onerror = (e) => {
        console.error(e);
        if (elementoBotao) {
          elementoBotao.classList.remove('playing');
          elementoBotao.textContent = '🔊';
        }
        document.getElementById('stopAudioBtn').style.display = 'none';
      };

      window.speechSynthesis.speak(utterance);
    }

    document.getElementById('stopAudioBtn').addEventListener('click', function() {
      if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
      document.querySelectorAll('.btn-audio.playing').forEach(b => {
        b.classList.remove('playing');
        b.textContent = '🔊';
      });
      this.style.display = 'none';
    });

    // ============================================================
    // PAGAMENTO
    // ============================================================
    function escolherValor(valor) {
      valorSelecionado = valor;
      document.querySelectorAll('.valor-btn').forEach(b => b.classList.remove('ativo'));
      // A classe é adicionada pelo evento inline
    }

    document.querySelectorAll('.valor-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.valor-btn').forEach(b => b.classList.remove('ativo'));
        this.classList.add('ativo');
        valorSelecionado = parseInt(this.textContent);
      });
    });

    async function startPayment() {
      const phone = document.getElementById('phone').value.trim();
      if (!phone) return alert('Digite o número Movitel.');
      const box = document.getElementById('paymentBox');
      box.innerHTML = '⏳ Processando...';
      try {
        const resp = await fetch(`${API_URL}/payment`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user: USER, amount: valorSelecionado, phone })
        });
        const data = await resp.json();
        if (data.success) {
          box.innerHTML = `<p style="color:#0f0;">✅ ${data.message}</p><p>Transacção: ${data.transactionId || 'N/A'}</p>`;
        } else {
          box.innerHTML = `<p style="color:#f44;">❌ ${data.message || 'Erro no pagamento.'}</p>`;
        }
      } catch (e) {
        box.innerHTML = '⚠️ Erro de rede.';
        console.error(e);
      }
    }

    // ============================================================
    // PDF
    // ============================================================
    async function gerarPDF() {
      const content = prompt('✏️ Digite o conteúdo do PDF:');
      if (!content) return;
      addMessage('⏳ A gerar PDF...', 'bot');
      try {
        const resp = await fetch(`${API_URL}/generate-pdf`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user: USER, content })
        });
        const data = await resp.json();
        const box = document.getElementById('chatBox');
        const last = box.lastElementChild;
        if (last && last.textContent.includes('A gerar PDF')) last.remove();
        addMessage(data.success ? `✅ ${data.message} (${data.file})` : `❌ ${data.message}`, 'bot');
      } catch (e) {
        addMessage('⚠️ Erro ao gerar PDF.', 'bot');
        console.error(e);
      }
    }

    // ============================================================
    // FOTO (UPLOAD)
    // ============================================================
    async function uploadFoto() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = async function() {
        if (!this.files || !this.files[0]) return;
        const formData = new FormData();
        formData.append('photo', this.files[0]);
        addMessage('⏳ A enviar foto...', 'bot');
        try {
          const resp = await fetch(`${API_URL}/upload-photo`, {
            method: 'POST',
            body: formData
          });
          const data = await resp.json();
          const box = document.getElementById('chatBox');
          const last = box.lastElementChild;
          if (last && last.textContent.includes('A enviar foto')) last.remove();
          addMessage(data.success ? `✅ ${data.message} (${data.file})` : `❌ ${data.message}`, 'bot');
        } catch (e) {
          addMessage('⚠️ Erro no upload.', 'bot');
          console.error(e);
        }
      };
      input.click();
    }

    // ============================================================
    // INICIALIZAÇÃO
    // ============================================================
    addMessage('💬 Olá! Sou a Vaga, a tua assistente de empregos.', 'bot');
    addMessage('🧠 Modelo: OpenRouter | 🇧🇷 PT', 'bot');
    addMessage('⚡ Envia uma mensagem ou usa os botões abaixo.', 'bot');
  </script>

</body>
    </html>
