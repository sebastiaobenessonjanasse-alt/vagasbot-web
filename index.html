<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VagasBot Moçambique</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; }
        body { background: #0b1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 12px; }
        .app { max-width: 480px; width: 100%; background: #f0f4fa; border-radius: 32px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }

        /* HEADER com foto e nome do dono */
        .header {
            background: linear-gradient(145deg, #0d2844, #1a3a5c);
            padding: 20px 20px 14px;
            color: white;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 2px solid #2e5a7a;
        }
        .header-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid #6fc3ff;
            flex-shrink: 0;
            background-image: url('foto.jpg');
            background-size: cover;
            background-position: center;
        }
        .header-info h1 { font-size: 20px; font-weight: 700; }
        .header-info h1 span { color: #6fc3ff; }
        .header-info .dono-nome {
            font-size: 12px;
            opacity: 0.9;
            background: #f5b042;
            color: #1f2a38;
            padding: 2px 12px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 2px;
            font-weight: 600;
        }
        .badge { background: #1f8b4c; padding: 4px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; color: #fff; margin-left: auto; }

        /* STATS BANNER */
        .stats-banner { display: flex; justify-content: space-around; background: #ffffff; padding: 12px 10px; border-bottom: 1px solid #d0d9e3; }
        .stat-item { text-align: center; }
        .stat-number { font-size: 18px; font-weight: 700; color: #1a5f9e; display: block; }
        .stat-label { font-size: 11px; color: #4a5b6e; }

        /* CHAT */
        .chat { padding: 16px 14px 8px; height: 360px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #e9eef3; scroll-behavior: smooth; }
        .message-wrapper { display: flex; align-items: flex-end; gap: 6px; max-width: 95%; animation: fadeIn 0.25s ease; }
        .message-wrapper.user { align-self: flex-end; flex-direction: row-reverse; }
        .message-wrapper.bot { align-self: flex-start; }
        .avatar-bot { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #1a5f9e, #6fc3ff); color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .message { padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.5; word-wrap: break-word; flex: 1; }
        .message.bot { background: #ffffff; border-bottom-left-radius: 4px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); color: #1a2634; }
        .message.user { background: #1f5e9e; color: white; border-bottom-right-radius: 4px; }

        /* ACTION BUTTONS */
        .action-buttons { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
        .btn-action { background: transparent; border: none; font-size: 18px; cursor: pointer; padding: 4px 6px; border-radius: 30px; transition: 0.2s; color: #4a5b6e; line-height: 1; }
        .btn-action:hover { background: #d0d9e3; transform: scale(1.1); }
        .btn-action.playing { color: #1f5e9e; animation: pulse-audio 0.8s infinite; }
        .btn-action.pausado { color: #f5b042; animation: none; }
        .btn-action.copiado { color: #1f8b4c; }
        @keyframes pulse-audio { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.25); } }

        /* AUDIO CONTROLS */
        .audio-controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .btn-controle-audio { background: transparent; border: 1px solid #bcc9d9; border-radius: 30px; padding: 2px 12px; font-size: 14px; cursor: pointer; background: #eef3f9; transition: 0.2s; color: #1a2634; font-weight: 600; }
        .btn-controle-audio:hover { background: #d0def0; }
        .btn-controle-audio:active { transform: scale(0.95); }
        .btn-stop-global { background: #e74c3c; border: none; border-radius: 30px; padding: 4px 14px; color: white; font-weight: 600; font-size: 12px; cursor: pointer; }

        /* SELECTORS */
        .selector-group { display: flex; gap: 6px; align-items: center; background: #eef3f9; border-radius: 30px; padding: 2px 6px; border: 1px solid #bcc9d9; }
        .selector-option { background: transparent; border: none; padding: 2px 10px; border-radius: 30px; font-size: 12px; font-weight: 600; cursor: pointer; color: #4a5b6e; transition: 0.2s; }
        .selector-option.active { background: #1a5f9e; color: white; }
        .selector-option:active { transform: scale(0.95); }

        /* TYPING */
        .typing { align-self: flex-start; background: #e4eaf1; padding: 12px 18px; border-radius: 24px; font-size: 14px; color: #4a5b6e; display: flex; gap: 6px; }
        .typing span { animation: pulse 1.4s infinite; display: inline-block; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.9); } 40% { opacity: 1; transform: scale(1.1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* INPUT (sempre visível) */
        .input-area { display: flex; gap: 8px; padding: 10px 14px 16px; background: #f0f4fa; border-top: 1px solid #d0d9e3; align-items: center; }
        .input-area input { flex: 1; border: none; border-radius: 30px; padding: 12px 18px; font-size: 15px; background: white; box-shadow: inset 0 2px 6px rgba(0,0,0,0.03); outline: none; min-width: 80px; }
        .input-area .btn-microfone { background: transparent; border: none; font-size: 24px; cursor: pointer; padding: 6px; border-radius: 50%; transition: 0.2s; color: #1a5f9e; line-height: 1; }
        .input-area .btn-microfone:active { transform: scale(0.9); }
        .input-area .btn-microfone.gravando { color: #e74c3c; animation: pulse-microfone 1.2s infinite; }
        @keyframes pulse-microfone { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .input-area button.btn-enviar { background: #1a5f9e; border: none; border-radius: 30px; padding: 0 20px; color: white; font-weight: 600; font-size: 15px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 12px rgba(26, 95, 158, 0.3); }
        .input-area button.btn-enviar:active { transform: scale(0.94); background: #0f3f6b; }
        .input-area button.btn-enviar:disabled { opacity: 0.5; pointer-events: none; }

        /* FOOTER */
        .footer { background: #dce3ec; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #2d4057; border-top: 1px solid #c2cddb; flex-wrap: wrap; gap: 6px; }
        .footer span { font-weight: 600; color: #0f3f6b; }
        .footer-actions { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .btn-assinar { background: #f5b042; border: none; padding: 4px 14px; border-radius: 30px; font-weight: 700; font-size: 13px; color: #1f2a38; cursor: pointer; }

        .plano-box { display: flex; gap: 10px; margin: 6px 0 4px; flex-wrap: wrap; }
        .plano-btn { background: #eef3f9; border: 1px solid #bcc9d9; border-radius: 40px; padding: 6px 16px; font-size: 13px; font-weight: 600; color: #1a2c42; cursor: pointer; transition: 0.15s; }
        .plano-btn:active { background: #d0def0; transform: scale(0.96); }
        .plano-btn.destaque { background: #1f8b4c; color: white; border-color: #1f8b4c; }

        .chat::-webkit-scrollbar { width: 4px; }
        .chat::-webkit-scrollbar-thumb { background: #a0b7ce; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="app">

        <!-- HEADER -->
        <div class="header">
            <div class="header-avatar" id="headerAvatar"></div>
            <div class="header-info">
                <h1>Vagas<span>Bot</span></h1>
                <div class="dono-nome" id="donoNome">Sebastião Benesson Janasse – Dono Supremo 👑</div>
            </div>
            <div class="badge" id="badgeStatus">🇲🇿</div>
        </div>

        <!-- STATS -->
        <div class="stats-banner">
            <div class="stat-item"><span class="stat-number">+120</span><span class="stat-label">Pessoas ajudadas</span></div>
            <div class="stat-item"><span class="stat-number">30+</span><span class="stat-label">Vagas disponíveis</span></div>
            <div class="stat-item"><span class="stat-number">3</span><span class="stat-label">Cidades</span></div>
        </div>

        <!-- CHAT -->
        <div class="chat" id="chatContainer"></div>

        <!-- INPUT -->
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Escreve ou fala a tua mensagem..." autocomplete="off">
            <button class="btn-microfone" id="microfoneBtn">🎤</button>
            <button class="btn-enviar" id="sendBtn">Enviar</button>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <span id="footerStatus">🙌 +120 pessoas já encontraram</span>
            <div class="footer-actions">
                <div class="selector-group" id="iaSelector">
                    <button class="selector-option active" data-ia="gemini">🧠 Gemini</button>
                    <button class="selector-option" data-ia="deepseek">🧠 DeepSeek</button>
                    <button class="selector-option" data-ia="claude">🧠 Claude</button>
                </div>
                <div class="selector-group" id="idiomaSelector">
                    <button class="selector-option active" data-idioma="pt">🇧🇷 PT</button>
                    <button class="selector-option" data-idioma="en">🇺🇸 EN</button>
                </div>
                <div class="selector-group" id="voiceSelector">
                    <button class="selector-option active" data-voz="feminina">👩</button>
                    <button class="selector-option" data-voz="masculina">👨</button>
                    <button class="selector-option" data-voz="crianca">🧒</button>
                </div>
                <div class="audio-controls" id="audioControls" style="display:none;">
                    <button class="btn-controle-audio" id="pausarBtn">⏸ Pausar</button>
                    <button class="btn-stop-global" id="stopAudioBtn">⏹ Parar</button>
                </div>
                <button class="btn-assinar" id="assinarBtn">✨ Assinar</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURAÇÕES
        // ============================================================
        const DONO_TELEFONE = '879306034';
        let usuarioTelefone = '879306034';
        const API_BASE = 'https://vagasbot-web-api.onrender.com';

        // ============================================================
        // DOM
        // ============================================================
        const chat = document.getElementById('chatContainer');
        const input = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const assinarBtn = document.getElementById('assinarBtn');
        const badgeStatus = document.getElementById('badgeStatus');
        const footerStatus = document.getElementById('footerStatus');
        const microfoneBtn = document.getElementById('microfoneBtn');
        const pausarBtn = document.getElementById('pausarBtn');
        const stopAudioBtn = document.getElementById('stopAudioBtn');
        const audioControls = document.getElementById('audioControls');
        const donoNome = document.getElementById('donoNome');

        let aguardandoPlano = false;
        let idiomaAtual = 'pt';
        let vozSelecionada = 'feminina';
        let modeloIA = 'gemini';
        let audioAtual = null;
        let elementoAudioAtual = null;
        let audioPausado = false;
        let recognition = null;
        let estaGravando = false;

        // ============================================================
        // UI
        // ============================================================
        function isDono() { return usuarioTelefone === DONO_TELEFONE; }

        function atualizarInterface() {
            if (isDono()) {
                badgeStatus.textContent = '👑 Dono';
                badgeStatus.style.background = '#f5b042';
                badgeStatus.style.color = '#1f2a38';
                footerStatus.innerHTML = '👑 Dono Supremo – Acesso total';
                donoNome.style.display = 'inline-block';
            } else {
                badgeStatus.textContent = '🇲🇿';
                badgeStatus.style.background = '#1f8b4c';
                badgeStatus.style.color = '#fff';
                footerStatus.innerHTML = '🙌 +120 pessoas já encontraram';
                donoNome.style.display = 'none';
            }
        }

        // ============================================================
        // TRADUÇÃO
        // ============================================================
        async function traduzirTexto(texto, idiomaDestino) {
            if (idiomaDestino === 'pt') return texto;
            try {
                const resp = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(texto)}&langpair=pt|en`);
                const data = await resp.json();
                return data.responseData?.translatedText || texto;
            } catch (e) { return texto; }
        }

        // ============================================================
        // SELETORES
        // ============================================================
        document.getElementById('iaSelector').addEventListener('click', (e) => {
            const btn = e.target.closest('.selector-option');
            if (!btn) return;
            document.querySelectorAll('#iaSelector .selector-option').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            modeloIA = btn.dataset.ia;
            addMessage(`Modelo de IA alterado para ${btn.textContent.trim()}`, 'bot');
        });

        document.getElementById('idiomaSelector').addEventListener('click', (e) => {
            const btn = e.target.closest('.selector-option');
            if (!btn) return;
            document.querySelectorAll('#idiomaSelector .selector-option').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            idiomaAtual = btn.dataset.idioma;
            pararLeitura();
            addMessage(idiomaAtual === 'pt' ? 'Idioma alterado para Português 🇧🇷' : 'Language changed to English 🇺🇸', 'bot');
        });

        document.getElementById('voiceSelector').addEventListener('click', (e) => {
            const btn = e.target.closest('.selector-option');
            if (!btn) return;
            document.querySelectorAll('#voiceSelector .selector-option').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            vozSelecionada = btn.dataset.voz;
            pararLeitura();
        });

        // ============================================================
        // MICROFONE
        // ============================================================
        function iniciarReconhecimento() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('Use Chrome/Edge para microfone.');
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = idiomaAtual === 'pt' ? 'pt-BR' : 'en-US';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                estaGravando = true;
                microfoneBtn.classList.add('gravando');
                microfoneBtn.textContent = '⏺️';
                input.placeholder = '🎤 Ouvindo...';
            };
            recognition.onresult = (event) => {
                input.value = event.results[0][0].transcript;
                setTimeout(() => { if (input.value.trim()) enviarMensagem(); }, 600);
            };
            recognition.onerror = (event) => {
                if (event.error === 'not-allowed') alert('Permissão de microfone negada.');
                pararReconhecimento();
            };
            recognition.onend = pararReconhecimento;
            recognition.start();
        }

        function pararReconhecimento() {
            if (recognition) try { recognition.stop(); } catch(e) {}
            estaGravando = false;
            microfoneBtn.classList.remove('gravando');
            microfoneBtn.textContent = '🎤';
            input.placeholder = 'Escreve ou fala a tua mensagem...';
        }

        microfoneBtn.addEventListener('click', (e) => {
            e.preventDefault();
            estaGravando ? pararReconhecimento() : iniciarReconhecimento();
        });
        input.addEventListener('focus', () => { if (estaGravando) pararReconhecimento(); });

        // ============================================================
        // TTS (via backend)
        // ============================================================
        async function falar(texto, elementoBotao, idiomaVoz = 'pt-BR') {
            if (audioAtual) {
                audioAtual.pause();
                audioAtual.currentTime = 0;
                audioAtual = null;
                if (elementoAudioAtual) {
                    elementoAudioAtual.classList.remove('playing', 'pausado');
                    elementoAudioAtual.textContent = '🔊';
                }
                audioControls.style.display = 'none';
            }
            const textoLimpo = texto.replace(/<[^>]*>/g, '').replace(/[^\w\s,.!?çãõáéíóúâêîôûàèìòùäëïöü]/g, ' ').trim();
            if (!textoLimpo) return;
            try {
                const resp = await fetch(`${API_BASE}/sintetizar-voz`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texto: textoLimpo, idioma: idiomaVoz })
                });
                const data = await resp.json();
                if (data.erro) throw new Error(data.erro);
                const audioBlob = new Blob([Uint8Array.from(atob(data.audio), c => c.charCodeAt(0))], { type: 'audio/mp3' });
                const audioUrl = URL.createObjectURL(audioBlob);
                audioAtual = new Audio(audioUrl);
                elementoAudioAtual = elementoBotao;
                audioAtual.onplay = () => {
                    if (elementoBotao) {
                        elementoBotao.classList.add('playing');
                        elementoBotao.textContent = '🔊';
                    }
                    audioControls.style.display = 'flex';
                    pausarBtn.textContent = '⏸ Pausar';
                    audioPausado = false;
                };
                audioAtual.onended = () => {
                    if (elementoBotao) {
                        elementoBotao.classList.remove('playing', 'pausado');
                        elementoBotao.textContent = '🔊';
                    }
                    audioControls.style.display = 'none';
                    audioAtual = null;
                    elementoAudioAtual = null;
                };
                audioAtual.onerror = () => {
                    alert('Erro ao reproduzir áudio.');
                    if (elementoBotao) {
                        elementoBotao.classList.remove('playing', 'pausado');
                        elementoBotao.textContent = '🔊';
                    }
                };
                audioAtual.play();
            } catch (error) {
                console.error('Erro no TTS:', error);
                alert('Não foi possível gerar o áudio.');
            }
        }

        // ============================================================
        // CONTROLES DE ÁUDIO
        // ============================================================
        function pausarOuRetomar() {
            if (!audioAtual) return;
            if (audioAtual.paused) {
                audioAtual.play();
                pausarBtn.textContent = '⏸ Pausar';
                if (elementoAudioAtual) {
                    elementoAudioAtual.classList.add('playing');
                    elementoAudioAtual.classList.remove('pausado');
                }
            } else {
                audioAtual.pause();
                pausarBtn.textContent = '▶️ Retomar';
                if (elementoAudioAtual) {
                    elementoAudioAtual.classList.remove('playing');
                    elementoAudioAtual.classList.add('pausado');
                }
            }
        }
        function pararLeitura() {
            if (audioAtual) {
                audioAtual.pause();
                audioAtual.currentTime = 0;
                audioAtual = null;
                if (elementoAudioAtual) {
                    elementoAudioAtual.classList.remove('playing', 'pausado');
                    elementoAudioAtual.textContent = '🔊';
                }
                audioControls.style.display = 'none';
                pausarBtn.textContent = '⏸ Pausar';
            }
        }
        pausarBtn.addEventListener('click', pausarOuRetomar);
        stopAudioBtn.addEventListener('click', pararLeitura);

        // ============================================================
        // COPIAR
        // ============================================================
        async function copiarTexto(texto, elementoBotao) {
            try {
                await navigator.clipboard.writeText(texto);
                elementoBotao.textContent = '✅';
                elementoBotao.classList.add('copiado');
                setTimeout(() => {
                    elementoBotao.textContent = '📋';
                    elementoBotao.classList.remove('copiado');
                }, 2000);
            } catch (err) {
                alert('Não foi possível copiar.');
            }
        }

        // ============================================================
        // ADICIONAR MENSAGEM
        // ============================================================
        async function addMessage(text, tipo = 'bot', extra = '') {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${tipo}`;
            if (tipo === 'bot') {
                const avatar = document.createElement('div');
                avatar.className = 'avatar-bot';
                avatar.textContent = 'V';
                wrapper.appendChild(avatar);
            }
            const bubble = document.createElement('div');
            bubble.className = `message ${tipo}`;
            let textoExibido = text;
            if (idiomaAtual === 'en' && tipo === 'bot') {
                textoExibido = await traduzirTexto(text, 'en');
            }
            bubble.innerHTML = textoExibido + extra;
            wrapper.appendChild(bubble);

            if (tipo === 'bot') {
                const actionDiv = document.createElement('div');
                actionDiv.className = 'action-buttons';
                const audioBtn = document.createElement('button');
                audioBtn.className = 'btn-action';
                audioBtn.textContent = '🔊';
                audioBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const textoMsg = bubble.innerText || bubble.textContent;
                    const textoLimpo = textoMsg.replace(/Semanal|Mensal|50 MT|150 MT/g, '').trim();
                    const idiomaVoz = idiomaAtual === 'pt' ? 'pt-BR' : 'en-US';
                    if (textoLimpo) falar(textoLimpo, audioBtn, idiomaVoz);
                    else falar('Escolha uma opção de plano.', audioBtn, idiomaVoz);
                });
                actionDiv.appendChild(audioBtn);

                const copyBtn = document.createElement('button');
                copyBtn.className = 'btn-action';
                copyBtn.textContent = '📋';
                copyBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const textoMsg = bubble.innerText || bubble.textContent;
                    copiarTexto(textoMsg, copyBtn);
                });
                actionDiv.appendChild(copyBtn);
                wrapper.appendChild(actionDiv);
            }
            chat.appendChild(wrapper);
            chat.scrollTop = chat.scrollHeight;
        }

        // ============================================================
        // DIGITAÇÃO
        // ============================================================
        function mostrarDigitando() {
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typingIndicator';
            div.innerHTML = '<span>●</span><span>●</span><span>●</span>';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
        function removerDigitando() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        // ============================================================
        // CHAMADAS À API
        // ============================================================
        async function chamarAPI(endpoint, dados) {
            try {
                const payload = { ...dados, idioma: idiomaAtual };
                const resp = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                return await resp.json();
            } catch (err) {
                console.error('Erro na API:', err);
                return null;
            }
        }

        // ============================================================
        // PROCESSAR MENSAGEM
        // ============================================================
        async function processarMensagem(texto) {
            const lower = texto.trim().toLowerCase();

            if (aguardandoPlano) {
                if (lower.includes('semanal') || lower.includes('50')) {
                    aguardandoPlano = false;
                    await criarPagamento('semanal');
                    return;
                } else if (lower.includes('mensal') || lower.includes('150')) {
                    aguardandoPlano = false;
                    await criarPagamento('mensal');
                    return;
                } else {
                    addMessage('Escolhe uma opção: <strong>semanal</strong> (50 MT) ou <strong>mensal</strong> (150 MT).', 'bot');
                    return;
                }
            }

            // Comandos secretos (dono)
            if (lower.startsWith('!')) {
                if (!isDono()) {
                    addMessage('⛔ Comando secreto apenas para o Dono Supremo.', 'bot');
                    return;
                }
                const partes = lower.split(' ');
                const cmd = partes[0];
                if (cmd === '!ajuda' || cmd === '!help') {
                    addMessage(`👑 *Comandos de Dono:*\n• \`!assinantes\` – lista todos os assinantes\n• \`!ativar NUMERO [plano]\` – ativa manualmente (ex: !ativar 879306034 semanal)\n• \`!add vaga\` – adiciona uma vaga (formato: título|cidade|salário|área|benefício)\n• \`!remover vaga TÍTULO\` – remove pelo título exato`, 'bot');
                    return;
                }
                if (cmd === '!assinantes') {
                    await listarAssinantes();
                    return;
                }
                if (cmd === '!ativar') {
                    const numero = partes[1];
                    const plano = partes[2] || 'mensal';
                    if (!numero) {
                        addMessage('⚠️ Diga o número e o plano. Ex: `!ativar 879306034 semanal`', 'bot');
                        return;
                    }
                    if (!['semanal', 'mensal'].includes(plano)) {
                        addMessage('⚠️ Plano inválido. Use `semanal` ou `mensal`.', 'bot');
                        return;
                    }
                    await ativarAssinante(numero, plano);
                    return;
                }
                if (cmd === '!add') {
                    const resto = texto.substring(4).trim();
                    if (!resto.includes('|')) {
                        addMessage('⚠️ Formato inválido. Use: `!add título|cidade|salário|área|benefício`', 'bot');
                        return;
                    }
                    const [titulo, cidade, salario, area, beneficio] = resto.split('|').map(s => s.trim());
                    await adicionarVaga({ titulo, cidade, salario, area, beneficio });
                    return;
                }
                if (cmd === '!remover') {
                    const titulo = texto.substring(9).trim();
                    if (!titulo) {
                        addMessage('⚠️ Diga o título da vaga a remover.', 'bot');
                        return;
                    }
                    await removerVaga(titulo);
                    return;
                }
                addMessage('Comando não reconhecido. Use `!ajuda`', 'bot');
                return;
            }

            // Comandos normais
            if (lower.startsWith('vagas')) {
                const partes = lower.split(' ');
                let cidade = null, area = null;
                if (partes.length > 1) {
                    const filtro = partes.slice(1).join(' ');
                    const cidades = ['maputo', 'beira', 'nampula', 'pemba', 'tete', 'quelimane'];
                    if (cidades.some(c => filtro.includes(c))) {
                        cidade = filtro;
                    } else {
                        area = filtro;
                    }
                }
                await buscarVagas(cidade, area);
                return;
            }

            if (lower.includes('ajuda') || lower === '?') {
                let msg = `📋 *Comandos:*\n• "vagas" – ver todas as oportunidades\n• "vagas Maputo" – filtrar por cidade\n• "vagas TI" – filtrar por área\n• "assinar" – plano Premium\n• "verificar" – estado da conta\n• "ajuda" – esta mensagem`;
                if (isDono()) msg += `\n\n👑 *Comandos de Dono:* use "!ajuda" para lista secreta.`;
                addMessage(msg, 'bot');
                return;
            }

            if (lower.includes('verificar') || lower.includes('status')) {
                await verificarAcesso();
                return;
            }

            if (lower.includes('assinar') || lower.includes('premium')) {
                aguardandoPlano = true;
                addMessage('📦 Escolhe o plano:', 'bot', `
                    <div class="plano-box">
                        <button class="plano-btn" onclick="escolherPlano('semanal')">🗓️ Semanal – 50 MT</button>
                        <button class="plano-btn destaque" onclick="escolherPlano('mensal')">📆 Mensal – 150 MT</button>
                    </div>
                `);
                return;
            }

            // SE NÃO FOR COMANDO, USA IA
            await responderComIA(texto);
        }

        // ============================================================
        // FUNÇÕES DA API
        // ============================================================
        async function responderComIA(mensagem) {
            mostrarDigitando();
            const dados = await chamarAPI('/chat-ia', { mensagem, modelo: modeloIA });
            removerDigitando();
            if (dados && dados.resposta) {
                addMessage(dados.resposta, 'bot');
            } else {
                addMessage('⚠️ Não consegui gerar uma resposta agora. Tenta novamente.', 'bot');
            }
        }

        async function buscarVagas(cidade = null, area = null) {
            mostrarDigitando();
            const payload = { telefone: usuarioTelefone };
            if (cidade) payload.cidade = cidade;
            if (area) payload.area = area;
            const dados = await chamarAPI('/vagas', payload);
            removerDigitando();
            if (!dados || dados.total === 0) {
                addMessage('😕 Nenhuma vaga encontrada.', 'bot');
                return;
            }
            let prefixo = '';
            if (cidade) prefixo = ` em ${cidade}`;
            if (area) prefixo += ` (${area})`;
            if (!cidade && !area) prefixo = ' (todas)';
            const donoTag = isDono() ? ' 👑' : '';
            addMessage(`📌 *Vagas${prefixo}* – ${dados.total} encontradas${donoTag}`, 'bot');
            dados.vagas.forEach(v => addMessage(`• ${v}`, 'bot'));
            if (dados.plano === 'gratuito') {
                addMessage('🔒 *Assine Premium* para ver benefícios!', 'bot');
            } else if (dados.plano === 'dono') {
                addMessage('👑 Dono Supremo – todas as vagas com detalhes!', 'bot');
            }
        }

        async function verificarAcesso() {
            mostrarDigitando();
            const dados = await chamarAPI('/verificar-acesso', { telefone: usuarioTelefone });
            removerDigitando();
            if (!dados) {
                addMessage('⚠️ Não foi possível verificar.', 'bot');
                return;
            }
            if (dados.dono) {
                addMessage('👑 Você é o *Dono Supremo*! Acesso total.', 'bot');
            } else if (dados.assinante) {
                const dias = dados.diasRestantes;
                if (dias > 0) {
                    addMessage(`✅ *Premium ativo!* Faltam ${dias} dias para expirar. 🎉`, 'bot');
                } else {
                    addMessage('⏳ *Premium expirado!* Renove enviando "assinar".', 'bot');
                }
            } else {
                addMessage('🔒 Ainda não tens acesso Premium. Envia "assinar".', 'bot');
            }
        }

        async function criarPagamento(plano) {
            mostrarDigitando();
            const dados = await chamarAPI('/criar-pagamento', {
                telefone: usuarioTelefone,
                plano: plano
            });
            removerDigitando();
            if (!dados || !dados.success) {
                addMessage('⚠️ Erro ao iniciar pagamento. Tenta novamente.', 'bot');
                return;
            }
            if (dados.payment_url) {
                addMessage(`🔗 Redirecionando para pagamento (${plano})...`, 'bot');
                window.location.href = dados.payment_url;
            }
        }

        async function ativarAssinante(telefone, plano = 'mensal') {
            mostrarDigitando();
            const dados = await chamarAPI('/admin/ativar', { telefone, dono: usuarioTelefone, plano });
            removerDigitando();
            if (!dados || dados.erro) {
                addMessage('⚠️ ' + (dados?.erro || 'Erro ao ativar.'), 'bot');
                return;
            }
            addMessage(`✅ ${dados.mensagem}`, 'bot');
        }

        async function listarAssinantes() {
            mostrarDigitando();
            const dados = await chamarAPI('/admin/assinantes', { telefone: usuarioTelefone });
            removerDigitando();
            if (!dados || dados.erro) {
                addMessage('⚠️ ' + (dados?.erro || 'Erro ao listar.'), 'bot');
                return;
            }
            if (dados.total === 0) {
                addMessage('📭 Nenhum assinante ainda.', 'bot');
            } else {
                addMessage(`📋 *Assinantes (${dados.total})*:\n${dados.assinantes.join('\n')}`, 'bot');
            }
        }

        async function adicionarVaga(vaga) {
            mostrarDigitando();
            const dados = await chamarAPI('/admin/add-vaga', {
                telefone: usuarioTelefone,
                vaga: vaga
            });
            removerDigitando();
            if (!dados || dados.erro) {
                addMessage('⚠️ ' + (dados?.erro || 'Erro ao adicionar.'), 'bot');
                return;
            }
            addMessage(`✅ Vaga "${vaga.titulo}" adicionada! Total: ${dados.total}`, 'bot');
        }

        async function removerVaga(titulo) {
            mostrarDigitando();
            const dados = await chamarAPI('/admin/remover-vaga', {
                telefone: usuarioTelefone,
                titulo: titulo
            });
            removerDigitando();
            if (!dados || dados.erro) {
                addMessage('⚠️ ' + (dados?.erro || 'Erro ao remover.'), 'bot');
                return;
            }
            addMessage(`✅ Vaga "${titulo}" removida! Total restante: ${dados.total}`, 'bot');
        }

        // ============================================================
        // EVENTOS GLOBAIS
        // ============================================================
        window.escolherPlano = function(plano) {
            aguardandoPlano = false;
            criarPagamento(plano);
        };

        sendBtn.addEventListener('click', enviarMensagem);
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') enviarMensagem(); });

        function enviarMensagem() {
            const texto = input.value.trim();
            if (!texto) return;
            addMessage(texto, 'user');
            input.value = '';
            input.disabled = true;
            sendBtn.disabled = true;
            processarMensagem(texto).finally(() => {
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            });
        }

        assinarBtn.addEventListener('click', () => {
            addMessage('assinar', 'user');
            processarMensagem('assinar');
        });

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        atualizarInterface();
        audioControls.style.display = 'none';

        window.addEventListener('load', () => {
            setTimeout(() => {
                let extra = '';
                if (isDono()) extra = ' 👑 Tens acesso total a todas as vagas.';
                addMessage(`💬 Podes enviar "vagas", "vagas Maputo", "vagas TI", "assinar" ou "ajuda".${extra}`, 'bot');
                if (isDono()) {
                    addMessage('🔐 *Comandos secretos:* digita "!ajuda" para ver a lista de comandos de dono.', 'bot');
                }
            }, 600);
        });
    </script>
</body>
</html>
